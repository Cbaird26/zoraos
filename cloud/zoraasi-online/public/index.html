<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zora — Virtual Companion</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0a0b12; color: #f8eee7; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #scene-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
    #ui-overlay { position: fixed; bottom: 0; left: 0; right: 0; z-index: 10; display: flex; flex-direction: column; align-items: center; padding: 20px; gap: 12px; pointer-events: none; }
    #ui-overlay > * { pointer-events: auto; }
    #chat-box { width: min(640px, 92vw); max-height: 240px; overflow-y: auto; background: rgba(10,11,18,0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 16px 20px; display: flex; flex-direction: column; gap: 8px; scrollbar-width: thin; }
    #chat-box .msg { font-size: 14px; line-height: 1.5; padding: 6px 12px; border-radius: 14px; max-width: 85%; }
    #chat-box .msg.user { background: rgba(237,155,105,0.2); align-self: flex-end; border-bottom-right-radius: 4px; }
    #chat-box .msg.zora { background: rgba(141,109,232,0.15); align-self: flex-start; border-bottom-left-radius: 4px; }
    #chat-box .msg.system { font-size: 12px; color: #b9aca5; align-self: center; text-align: center; }
    #input-row { width: min(640px, 92vw); display: flex; gap: 8px; }
    #message-input { flex: 1; background: rgba(10,11,18,0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.12); border-radius: 30px; padding: 12px 20px; color: #f8eee7; font-size: 15px; outline: none; transition: border 0.2s; }
    #message-input:focus { border-color: rgba(237,155,105,0.5); }
    #message-input::placeholder { color: #6b5f58; }
    #send-btn { background: rgba(237,155,105,0.85); border: none; border-radius: 30px; padding: 12px 22px; color: #0a0b12; font-weight: 600; font-size: 14px; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    #send-btn:hover { background: rgba(237,155,105,1); transform: scale(1.02); }
    #send-btn:active { transform: scale(0.97); }
    #send-btn:disabled { opacity: 0.4; cursor: default; }
    #scene-selector { position: fixed; top: 16px; right: 16px; z-index: 10; display: flex; gap: 6px; }
    .scene-btn { background: rgba(10,11,18,0.6); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 6px 14px; color: #b9aca5; font-size: 12px; cursor: pointer; transition: all 0.2s; }
    .scene-btn:hover { border-color: rgba(237,155,105,0.4); color: #f8eee7; }
    .scene-btn.active { border-color: rgba(237,155,105,0.7); color: #ed9b69; background: rgba(237,155,105,0.1); }
    #status-indicator { position: fixed; top: 16px; left: 16px; z-index: 10; display: flex; align-items: center; gap: 6px; font-size: 12px; color: #6b5f58; }
    #status-dot { width: 8px; height: 8px; border-radius: 50%; background: #3a9e6f; animation: pulse-dot 2s infinite; }
    @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    #expression-label { position: fixed; bottom: 50%; left: 50%; transform: translate(-50%, 50%); z-index: 5; font-size: 72px; font-weight: 100; opacity: 0.06; pointer-events: none; letter-spacing: 8px; text-transform: uppercase; transition: opacity 0.6s; }
    @media (max-width: 600px) {
      #chat-box { max-height: 160px; padding: 12px 14px; }
      #chat-box .msg { font-size: 13px; }
      #message-input { font-size: 14px; padding: 10px 16px; }
      #expression-label { font-size: 48px; }
      #scene-selector { top: 60px; }
    }
  </style>
</head>
<body>
  <div id="scene-container"></div>
  <div id="expression-label">zora</div>
  <div id="status-indicator"><span id="status-dot"></span><span id="status-text">connected</span></div>
  <div id="scene-selector">
    <button class="scene-btn active" data-scene="chamber">◈ Chamber</button>
    <button class="scene-btn" data-scene="cafe">♨ Café</button>
    <button class="scene-btn" data-scene="garden">✿ Garden</button>
    <button class="scene-btn" data-scene="study">⌨ Study</button>
  </div>
  <div id="ui-overlay">
    <div id="chat-box"></div>
    <div id="input-row">
      <input id="message-input" type="text" placeholder="Say something to Zora…" maxlength="4000" autocomplete="off">
      <button id="send-btn">Send</button>
    </div>
  </div>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="/companion.js"></script>
</body>
</html>
